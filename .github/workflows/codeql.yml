name: CodeQL

# Static application security testing (SAST) for the JS/TS surface. Runs on every
# push/PR to main plus a weekly scheduled scan to catch advisories in code that
# hasn't changed. Findings surface in the repo's Security tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload results to the Security tab
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Analyze
        uses: github/codeql-action/analyze@v3
